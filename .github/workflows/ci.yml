name: CI

on:
  push:
    branches:
      - capsula/consolidation
  pull_request:
    branches:
      - capsula/consolidation
  workflow_dispatch:

jobs:
  validate:
    name: Validate (lint + typecheck + tests)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: capsula_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d capsula_ci"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/capsula_ci?schema=public

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      # FASE 3 BLOCKER: prisma/migrations/ carece de un baseline 0_init porque
      # el schema base fue creado originalmente vía `prisma db push` en la era
      # pre-migrations. Las 26 migraciones actuales son solo deltas y fallan
      # al correr contra una DB vacía (la primera ALTER sobre PurchaseOrder
      # asume que la tabla ya existe).
      #
      # Volver a `prisma migrate deploy` cuando se cree la migración baseline
      # durante Fase 3 (multi-tenancy fuerza la resolución correcta).
      - name: Sync schema to database (CI bypasses migration history)
        run: npx prisma db push --skip-generate --accept-data-loss

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: Run tests
        run: npm run test

  # FASE 4: habilitar trigger on push a capsula/consolidation
  # cuando existan los secrets CONTABO_HOST, CONTABO_USER, CONTABO_SSH_KEY.
  # Por ahora solo se dispara manualmente desde Actions tab.
  #
  # Secrets esperados:
  #   CONTABO_HOST         - host/IP del servidor Contabo
  #   CONTABO_USER         - usuario SSH (p.ej. root o deploy)
  #   CONTABO_SSH_KEY      - clave privada SSH para autenticar
  #   DATABASE_URL_PROD    - URL de la base de datos productiva (usada por prisma migrate deploy)
  deploy:
    name: Deploy to Contabo
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'workflow_dispatch'
    timeout-minutes: 20

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.CONTABO_HOST }}
          username: ${{ secrets.CONTABO_USER }}
          key: ${{ secrets.CONTABO_SSH_KEY }}
          script_stop: true
          envs: DATABASE_URL_PROD
          script: |
            set -e

            echo ">>> Entrando al proyecto"
            cd /var/www/capsula-erp

            echo ">>> Pull"
            git pull

            echo ">>> Instalando dependencias (incluye dev)"
            npm ci --production=false

            echo ">>> Aplicando migraciones Prisma"
            export DATABASE_URL="${DATABASE_URL_PROD}"
            npx prisma migrate deploy

            echo ">>> Build"
            npm run build

            echo ">>> Recargando PM2"
            pm2 reload all

            echo ">>> Deploy completado OK"
